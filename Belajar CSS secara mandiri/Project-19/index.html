<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kalkulator</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <button class="brightness"><img src="img/brightness-high.svg" alt="brightness" id="bright"></button>
        <div class="container">
            <h1>Kalkulator sederhana</h1>
            <div class="kalkulator">
                <p class="box_besar" id="hasil"></p>
                <button class="box_0">0</button>
                <button class="box_1">1</button>
                <button class="box_2">2</button>
                <button class="box_3">3</button>
                <button class="box_4">4</button>
                <button class="box_5">5</button>
                <button class="box_6">6</button>
                <button class="box_7">7</button>
                <button class="box_8">8</button>
                <button class="box_9">9</button>
                <button class="tambah">+</button>
                <button class="kali">*</button>
                <button class="kurang">-</button>
                <button class="sama_dengan">=</button>
                <button class="pangkat">**</button>
                <button class="bagi">/</button>
                <button class="hapus">C</button>
                <button class="hapus_semua">CA</button>
                <button class="koma">,</button>
                <button class="titik">.</button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
