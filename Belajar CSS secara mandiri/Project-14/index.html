<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>project to do list</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <h1>To-do List</h1>
        <div class="all">
            <div class="container">
                <table class="table" id="1">
                    <tr>
                        <th id="th1"></th>
                        <th id="th2">Nama</th>
                        <th id="th3">Kegiatan</th>
                        <th id="th4">Waktu</th>
                    </tr>
                </table>
            </div>
            <div class="control">
                <button class="button-tambah" id="tambahkan">+</button>
                <input type="text" id="nama" placeholder="Nama" class="input">
                <input type="text" id="kegiatan" placeholder="Kegiatan" class="input">
                <input type="text" id="waktu" placeholder="Waktu (Gak wajib)" class="input">
                <button id="cancel" class="input">Cancel</button>
                <button id="submit" class="input">Submit</button>
            </div>
            <script src="script.js"></script>
        </div>
    </body>
</html>
