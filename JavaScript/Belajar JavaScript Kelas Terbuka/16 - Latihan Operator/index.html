<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <div class="row my-5">
                <h1 class="text-center">episode 16 - latihan operator</h1>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-2">
                    <div class="input-group">
                        <input type="text" id="aritmatika_angka_1" class="form-control"
                        placeholder="Angka 1" aria-label="Angka 1">
                    </div>
                </div>
                <div class="col-2">
                    <div class="input-group">
                        <select id="operator_aritmatika" class="form-select">
                            <option selected>Pilih Operator</option>
                            <option value="+">+</option>
                            <option value="-">-</option>
                            <option value="/">/</option>
                            <option value="*">X</option>
                            <option value="%">%</option>
                        </select>
                    </div>
                </div>
                <div class="col-2">
                    <div class="input-group">
                        <input type="number" id="aritmatika_angka_2" class="form-control"
                        placeholder="Angka 2" aria-label="Angka 2">
                    </div>
                </div>
                <div class="col-3">

                        <button type="button" class="btn btn-primary" id="button_aritmatika">Hasil Hitung</button>

                    <span class="mx-4" id="hasil_operator_aritmatika">Hasil</span>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK" crossorigin="anonymous"></script>
        <script src="script.js"></script>
    </body>
</html>
